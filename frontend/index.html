<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pluto3D Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#020617;
color:white;
overflow:hidden;
}

/* layout */

.workspace{

display:grid;
grid-template-columns:90px 420px 1fr;
height:100vh;

}

/* sidebar */

.sidebar{

background:#020617;
border-right:1px solid rgba(56,189,248,0.2);

display:flex;
flex-direction:column;
align-items:center;

padding-top:25px;
gap:20px;

}

.logo{

font-family:Orbitron;
color:#38bdf8;
margin-bottom:20px;

}

.sidebtn{

width:60px;
height:60px;

border-radius:12px;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

background:rgba(14,165,233,0.1);
border:1px solid rgba(56,189,248,0.4);

transition:0.2s;

}

.sidebtn:hover{

background:#0ea5e9;

}

/* panel */

.panel{

padding:30px;
overflow:auto;

background:

linear-gradient(
180deg,
rgba(15,23,42,0.8),
rgba(2,6,23,0.95)
);

border-right:1px solid rgba(56,189,248,0.2);

}

/* viewer */

.viewer{

background:black;
position:relative;

}

.viewer-title{

position:absolute;
top:20px;
left:20px;

font-family:Orbitron;
color:#38bdf8;

}

#viewer{

width:100%;
height:100%;

box-shadow:
0 0 60px rgba(14,165,233,0.4);

}

/* panels */

.toolpanel{

display:block;

}

.hidden{

display:none;

}

/* title */

.section-title{

font-family:Orbitron;
font-size:22px;
color:#38bdf8;
margin-bottom:20px;

}

/* upload */

.dropzone{

border:2px dashed #0ea5e9;
border-radius:14px;

padding:35px;
text-align:center;

margin-bottom:15px;

}

/* buttons */

button{

width:100%;
padding:12px;

margin-top:10px;

border:none;
border-radius:10px;

cursor:pointer;

background:
linear-gradient(135deg,#0ea5e9,#38bdf8);

color:white;

}

.btn-premium{

background:
linear-gradient(135deg,#f59e0b,#f97316);

}

/* preview */

.preview{

display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;

}

.preview img{

width:80px;
border-radius:8px;
border:2px solid #0ea5e9;

}

/* progress */

.progress{

height:6px;
background:#020617;
border-radius:10px;
overflow:hidden;
margin-top:15px;

}

.progress-bar{

height:100%;
width:0%;

background:
linear-gradient(90deg,#38bdf8,#0ea5e9);

}

/* status */

.status{

margin-top:10px;
font-size:13px;
color:#7dd3fc;

}

</style>
</head>

<body>

<div class="workspace">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">P3D</div>

<div class="sidebtn" onclick="openPanel('3d')">3D</div>

<div class="sidebtn" onclick="openPanel('svg')">SVG</div>

<div class="sidebtn" onclick="openPanel('ai')">AI</div>

<div class="sidebtn" onclick="openPanel('toy')">Toy</div>

</div>

<!-- PANEL -->

<div class="panel">

<!-- 3D -->

<div id="panel-3d" class="toolpanel">

<div class="section-title">3D Generator</div>

<div class="dropzone">

<input type="file" id="fileInput" multiple>

</div>

<button onclick="upload()">Upload Photos</button>

<button onclick="generateFree3D()">
Generate Free
</button>

<button class="btn-premium" onclick="generate3D()">
Generate Premium
</button>

<div class="preview" id="preview"></div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="status" id="status"></div>
<a id="downloadBtn" class="download-btn" style="display:none;" download>
Download 3D Model
</a>
</div>

<div id="panel-svg" class="toolpanel hidden">

<div class="section-title">SVG Generator</div>

<input type="file" id="svgInput">

<img id="svgUploadPreview" style="width:120px;margin-top:10px;border-radius:8px;">

<br><br>

<label>Mode</label>
<select id="svgMode">
<option value="outline">Outline</option>
<option value="engrave">Engrave</option>
<option value="stencil">Stencil</option>
</select>

<br><br>

<label>Shadow</label>
<input type="range" id="shadowRange" min="0" max="100" value="20">

<br><br>

<label>Contrast</label>
<input type="range" id="contrastRange" min="0" max="100" value="50">

<br><br>

<button onclick="generateSVG()">
Generate SVG
</button>

<div id="svgPreview"></div>

<a id="downloadSVG" style="display:none;" download>
<button style="margin-top:10px;">Download JSON</button>
</a>

</div>

<br><br>

<label>Mode</label>

<select id="svgMode">
<option value="outline">Outline</option>
<option value="engrave">Engrave</option>
<option value="stencil">Stencil</option>
</select>

<br><br>

<label>Shadow</label>
<input type="range" id="shadowRange" min="0" max="100" value="20">

<br><br>

<label>Contrast</label>
<input type="range" id="contrastRange" min="0" max="100" value="50">

<br><br>

<button onclick="generateSVG()">
Generate SVG
</button>

<div id="svgPreview"></div>

</div>


<!-- AI -->

<div id="panel-ai" class="toolpanel hidden">

<div class="section-title">AI Photo</div>

<input type="file">

<br><br>

<select>

<option>Cartoon</option>
<option>3D Toy</option>
<option>Metal</option>

</select>

<br><br>

<button onclick="generatePhotoAI()">
Generate AI Image
</button>

</div>


<!-- TOY -->

<div id="panel-toy" class="toolpanel hidden">

<div class="section-title">Toy Studio</div>

<button onclick="toyMode()">Toy Mode</button>

<button onclick="selfieToy()">Selfie Toy</button>

<br>

<button onclick="plasticToy()">Plastic</button>

<button onclick="goldToy()">Gold</button>

<button onclick="chromeToy()">Chrome</button>

<button onclick="cartoonToy()">Cartoon</button>

</div>

</div>


<!-- VIEWER -->

<div class="viewer">

<div class="viewer-title">AI Viewer</div>

<div id="viewer"></div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const API_BASE = "https://pluto3d-production.up.railway.app"

const input = document.getElementById("fileInput")
const preview = document.getElementById("preview")
const status = document.getElementById("status")
const progressBar = document.getElementById("progressBar")

let currentJobId=null

input.addEventListener("change",()=>{

preview.innerHTML=""

for(let file of input.files){

const img=document.createElement("img")
img.src=URL.createObjectURL(file)
preview.appendChild(img)

}

})

async function upload(){

if(input.files.length==0){

alert("Choose photos")

return

}

currentJobId=crypto.randomUUID()

for(let file of input.files){

let form=new FormData()

form.append("file",file)
form.append("job_id",currentJobId)

await fetch(API_BASE+"/api/upload",{
method:"POST",
body:form
})

}

status.innerHTML="Upload complete"

}

async function generate3D(){

status.innerHTML="Sending to AI..."

const res=await fetch(API_BASE+"/api/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
job_id:currentJobId
})

})

const data=await res.json()

checkStatus(data.task_id)

}

async function checkStatus(id){

const interval=setInterval(async()=>{

const res=await fetch(API_BASE+"/api/job/"+id)

const data=await res.json()

status.innerHTML="AI Processing "+data.progress+"%"

progressBar.style.width=data.progress+"%"

if(data.status==="SUCCEEDED"){

clearInterval(interval)

status.innerHTML="Model Ready"

const modelUrl = API_BASE + data.model_url

loadModel(modelUrl)

// DOWNLOAD BUTTON
const download = document.getElementById("downloadBtn")
download.href = modelUrl
download.style.display = "block"

}

},4000)

}

function generateFree3D(){

status.innerHTML="Free generation coming soon"

}

/* panels */

function openPanel(name){

document.querySelectorAll(".toolpanel")
.forEach(p=>p.classList.add("hidden"))

document
.getElementById("panel-"+name)
.classList.remove("hidden")

status.innerHTML=""
progressBar.style.width="0%"
}

/* three viewer */

const scene = new THREE.Scene()

const viewerContainer = document.getElementById("viewer")

const camera = new THREE.PerspectiveCamera(
75,
viewerContainer.clientWidth / viewerContainer.clientHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(
viewerContainer.clientWidth,
viewerContainer.clientHeight
)

document.getElementById("viewer").appendChild(renderer.domElement)

const light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(2,2,2)

scene.add(light)

camera.position.z=3

const controls=new THREE.OrbitControls(camera,renderer.domElement)

function loadModel(url){

const loader=new THREE.GLTFLoader()

loader.load(url,(gltf)=>{

while(scene.children.length > 0){
scene.remove(scene.children[0])
}

scene.add(light)
scene.add(gltf.scene)

})

}

function animate(){

requestAnimationFrame(animate)

renderer.render(scene,camera)

}

animate()
async function generateSVG(){

const file = document.getElementById("svgInput").files[0]

if(!file){
alert("Upload image first")
return
}

const form = new FormData()
form.append("file",file)

const res = await fetch(API_BASE+"/api/svg",{
method:"POST",
body:form
})

const data = await res.json()

const preview = document.getElementById("svgPreview")
preview.innerHTML = "JSON ready"

const download = document.getElementById("downloadSVG")

const blob = new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
)

const url = URL.createObjectURL(blob)

download.href = url
download.download = "vector.json"

download.style.display = "block"

}
document.getElementById("svgInput").addEventListener("change", function(){

const file = this.files[0]

if(!file) return

const url = URL.createObjectURL(file)

document.getElementById("svgUploadPreview").src = url

})
</script>

</body>
</html>
