<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pluto3D Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#020617;
color:white;
overflow:hidden;
}

/* layout */

.workspace{

display:grid;

grid-template-columns:90px 420px 1fr;

height:100vh;

}

/* sidebar */

.sidebar{

background:#020617;

border-right:1px solid rgba(56,189,248,0.2);

display:flex;
flex-direction:column;
align-items:center;
padding-top:30px;
gap:25px;

}

.logo{

font-family:Orbitron;
font-size:18px;
color:#38bdf8;

}

.tool{

width:60px;
height:60px;

border-radius:14px;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

background:rgba(14,165,233,0.1);

border:1px solid rgba(56,189,248,0.3);

transition:0.25s;

}

.tool:hover{

background:#0ea5e9;

}

/* workspace */

.panel{

padding:35px;

background:

linear-gradient(
180deg,
rgba(15,23,42,0.7),
rgba(2,6,23,0.9)
);

border-right:1px solid rgba(56,189,248,0.15);

overflow:auto;

}

/* title */

.title{

font-family:Orbitron;

font-size:28px;

color:#38bdf8;

margin-bottom:25px;

text-shadow:
0 0 10px #38bdf8,
0 0 30px #0ea5e9;

}

/* upload */

.dropzone{

border:2px dashed #0ea5e9;

border-radius:16px;

padding:40px;

text-align:center;

color:#7dd3fc;

margin-bottom:20px;

transition:0.25s;

}

.dropzone.drag{

background:rgba(14,165,233,0.1);

}

input[type=file]{

margin-top:15px;

}

/* buttons */

.btn{

width:100%;

padding:14px;

border-radius:12px;

border:none;

cursor:pointer;

margin-top:10px;

font-size:14px;

color:white;

background:

linear-gradient(135deg,#0ea5e9,#38bdf8);

box-shadow:

0 0 15px rgba(56,189,248,0.6);

transition:0.2s;

}

.btn:hover{

transform:translateY(-2px);

box-shadow:
0 0 25px #38bdf8;

}

.btn-premium{

background:

linear-gradient(135deg,#f59e0b,#f97316);

}

/* preview */

.preview{

display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:15px;

}

.preview img{

width:90px;

border-radius:10px;

border:2px solid #0ea5e9;

}

/* viewer */

.viewer{

position:relative;

background:black;

}

/* viewer title */

.viewer-title{

position:absolute;

top:20px;
left:20px;

font-family:Orbitron;

color:#38bdf8;

}

/* viewer glow */

.viewer canvas{

width:100%;
height:100%;

box-shadow:
0 0 80px rgba(14,165,233,0.4);

}

/* progress */

.progress{

height:6px;

background:#020617;

margin-top:15px;

border-radius:10px;

overflow:hidden;

}

.bar{

height:100%;

width:0%;

background:

linear-gradient(90deg,#38bdf8,#0ea5e9);

}

/* status */

.status{

margin-top:10px;

color:#7dd3fc;

font-size:13px;

}

</style>
</head>

<body>

<div class="workspace">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">P3D</div>

<div class="tool">3D</div>

<div class="tool">SVG</div>

<div class="tool">AI</div>

<div class="tool">Toy</div>

</div>

<!-- WORKSPACE -->

<div class="panel">

<div class="title">3D Generator</div>

<div class="dropzone" id="dropzone">

Drag Images Here

<br>

<input type="file" id="fileInput" multiple>

</div>

<button class="btn" onclick="upload()">Upload Photos</button>

<button class="btn" onclick="generateFree3D()">

Generate 3D (Free)

</button>

<button class="btn btn-premium" onclick="generate3D()">

Generate Premium

</button>

<div class="preview" id="preview"></div>

<div class="progress">

<div class="bar" id="bar"></div>

</div>

<div class="status" id="status"></div>

</div>

<!-- VIEWER -->

<div class="viewer">

<div class="viewer-title">AI Viewer</div>

<div id="viewer"></div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const API_BASE = "https://pluto3d-production.up.railway.app"

const input = document.getElementById("fileInput")
const preview = document.getElementById("preview")
const status = document.getElementById("status")
const bar = document.getElementById("bar")

let jobId=null

input.addEventListener("change",()=>{

preview.innerHTML=""

for(let file of input.files){

const img=document.createElement("img")

img.src=URL.createObjectURL(file)

preview.appendChild(img)

}

})

async function upload(){

if(input.files.length==0){

alert("Upload photos")

return

}

jobId=crypto.randomUUID()

for(let file of input.files){

let form=new FormData()

form.append("file",file)
form.append("job_id",jobId)

await fetch(API_BASE+"/api/upload",{

method:"POST",

body:form

})

}

status.innerHTML="Upload complete"

}

async function generate3D(){

status.innerHTML="Sending to AI..."

const res=await fetch(API_BASE+"/api/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
job_id:jobId
})

})

const data=await res.json()

checkStatus(data.task_id)

}

async function checkStatus(id){

const interval=setInterval(async()=>{

const res=await fetch(API_BASE+"/api/job/"+id)

const data=await res.json()

status.innerHTML="AI Processing "+data.progress+"%"

bar.style.width=data.progress+"%"

if(data.status==="SUCCEEDED"){

clearInterval(interval)

status.innerHTML="Model ready"

loadModel(API_BASE+data.model_url)

}

},4000)

}

/* three */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000)

const renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.getElementById("viewer").appendChild(renderer.domElement)

const light=new THREE.DirectionalLight(0xffffff,1)

light.position.set(2,2,2)

scene.add(light)

camera.position.z=3

const controls=new THREE.OrbitControls(camera,renderer.domElement)

function loadModel(url){

const loader=new THREE.GLTFLoader()

loader.load(url,(gltf)=>{

scene.clear()

scene.add(light)

scene.add(gltf.scene)

})

}

function animate(){

requestAnimationFrame(animate)

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
