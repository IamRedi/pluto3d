<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pluto3D Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter,Arial;
color:white;

background:
radial-gradient(circle at 20% 20%,#1e3a8a,#020617),
radial-gradient(circle at 80% 70%,#0ea5e9,#020617);

min-height:100vh;

display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

.title{
font-size:46px;
font-weight:600;
margin-bottom:35px;
color:#38bdf8;
letter-spacing:1px;
}

.panel{

background:rgba(15,23,42,0.6);
backdrop-filter:blur(14px);

border-radius:22px;
padding:30px;

width:820px;
margin-bottom:25px;

box-shadow:0 0 60px rgba(14,165,233,0.35);
}

.section{
margin-bottom:25px;
}

.section-title{
color:#38bdf8;
font-size:18px;
margin-bottom:15px;
}

.dropzone{
border:2px dashed #0ea5e9;
border-radius:14px;
padding:35px;
text-align:center;
color:#7dd3fc;
transition:0.25s;
}

.dropzone.dragover{
background:rgba(14,165,233,0.1);
}

input[type=file]{
margin-top:15px;
background:#020617;
padding:10px;
border-radius:10px;
border:1px solid #0ea5e9;
color:white;
}

.button-row{
margin-top:15px;
}

button{

background:linear-gradient(135deg,#0ea5e9,#0284c7);

border:none;
padding:12px 20px;

border-radius:12px;

color:white;

font-size:14px;

cursor:pointer;

margin:6px;

transition:0.25s;

}

button:hover{

transform:translateY(-2px) scale(1.05);

box-shadow:
0 0 20px #0ea5e9;

}

.preview{

display:flex;
flex-wrap:wrap;
margin-top:15px;

}

.preview img{

width:100px;

border-radius:10px;

margin:8px;

border:2px solid #0ea5e9;

box-shadow:0 0 10px rgba(14,165,233,0.5);

}

.status{

margin-top:15px;

font-size:14px;

color:#38bdf8;

}

.loader{

border:4px solid rgba(255,255,255,0.1);

border-top:4px solid #0ea5e9;

border-radius:50%;

width:25px;
height:25px;

animation:spin 1s linear infinite;

display:none;

margin:auto;

}

.progress{
height:10px;
background:#020617;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#38bdf8,#0ea5e9);
transition:width 0.4s;
}

#viewer{

width:800px;

height:560px;

background:black;

border-radius:20px;

box-shadow:
0 0 60px rgba(14,165,233,0.4);

}

.gallery{

display:grid;

grid-template-columns:repeat(auto-fill,110px);

gap:10px;

margin-top:15px;

}

.gallery img{

width:110px;

border-radius:10px;

border:2px solid #0ea5e9;

cursor:pointer;

}

@keyframes spin{

0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}

}

</style>

</head>

<body>

<div class="title">Pluto3D Studio</div>


<div class="panel">

<div class="section">

<div class="section-title">Upload Photos</div>

<div class="dropzone" id="dropzone">
Drag & Drop Images Here
<br>
or
<br>
<input type="file" id="fileInput" accept="image/*" multiple>
</div>

<div class="button-row">

<button onclick="upload()">Upload Photos</button>

<button onclick="generate()">Generate 3D</button>

</div>
<div class="button-row">

<button onclick="generate()">Generate 3D</button>

<button onclick="generateSVG()">Generate SVG Sketch</button>

</div>

<div class="loader" id="loader"></div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="preview" id="preview"></div>

<div class="status" id="status"></div>

<div id="svgPreview" style="margin-top:15px;"></div>

<a id="downloadBtn" style="display:none;" download>
<button>Download 3D Model</button>
</a>

</div>

</div>


<div class="panel">

<div class="section-title">Toy Studio</div>

<div class="button-row">

<button onclick="toyMode()">Toy Mode</button>

<button onclick="selfieToy()">Selfie Toy</button>

</div>

<div class="button-row">

<button onclick="plasticToy()">Plastic</button>

<button onclick="goldToy()">Gold</button>

<button onclick="chromeToy()">Chrome</button>

<button onclick="cartoonToy()">Cartoon</button>

</div>

</div>


<div class="panel">

<div class="section-title">3D Viewer</div>

<div id="viewer"></div>

</div>


<div class="panel">

<div class="section-title">Generated Models</div>

<div class="gallery" id="gallery"></div>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>


<script>

const API_BASE = "https://pluto3d-production.up.railway.app"

const input = document.getElementById("fileInput")
const preview = document.getElementById("preview")
const status = document.getElementById("status")
const progressBar = document.getElementById("progressBar")
const loader = document.getElementById("loader")

let currentJobId = null
let currentModel = null
let toyBase = null


// IMAGE PREVIEW

input.addEventListener("change", previewImages)

function previewImages(){

preview.innerHTML=""

const files = input.files

for(let i=0;i<files.length;i++){

const img = document.createElement("img")
img.src = URL.createObjectURL(files[i])
preview.appendChild(img)

}

}

// DRAG DROP

const dropzone = document.getElementById("dropzone")

dropzone.addEventListener("dragover", e=>{

 e.preventDefault()
 dropzone.classList.add("dragover")

})

dropzone.addEventListener("dragleave", ()=>{
 dropzone.classList.remove("dragover")
})

dropzone.addEventListener("drop", e=>{

 e.preventDefault()
 dropzone.classList.remove("dragover")

 input.files = e.dataTransfer.files
 previewImages()

})


// UPLOAD

async function upload(){

const files = input.files

if(files.length == 0){
alert("Choose photos first")
return
}

const jobId = crypto.randomUUID()
currentJobId = jobId

loader.style.display="block"

for(let i=0;i<files.length;i++){

const formData = new FormData()

formData.append("file", files[i])
formData.append("job_id", jobId)

await fetch(API_BASE + "/api/upload",{
method:"POST",
body:formData
})

}

loader.style.display="none"

status.innerHTML = "Upload complete | Job ID: " + jobId

}


// GENERATE

async function generateSVG(){

const files = input.files

if(files.length == 0){
alert("Choose an image first")
return
}

const formData = new FormData()
formData.append("file", files[0])

status.innerHTML = "Generating SVG sketch..."

const res = await fetch(API_BASE + "/api/svg",{
method:"POST",
body:formData
})

const data = await res.json()

const svgUrl = data.svg_url

status.innerHTML = "SVG Ready"

const svgPreview = document.getElementById("svgPreview")

svgPreview.innerHTML = `
<div style="margin-top:10px;">
<object data="${API_BASE + svgUrl}" type="image/svg+xml" width="300"></object>
<br>
<a href="${API_BASE + svgUrl}" download>
<button style="margin-top:10px;">Download SVG</button>
</a>
</div>
`

}

// CHECK STATUS

async function checkStatus(taskId){s

const interval = setInterval(async () => {

const res = await fetch(
API_BASE + "/api/job/" + taskId
)

const data = await res.json()

status.innerHTML =
"AI status: " + data.status +
" | progress: " + data.progress + "%"

progressBar.style.width = data.progress + "%"

if(data.status === "SUCCEEDED"){

clearInterval(interval)

const modelUrl = data.model_url

status.innerHTML = "3D Model Ready"

loadModel(modelUrl)

saveToGallery(modelUrl)

const download = document.getElementById("downloadBtn")
download.href = modelUrl
download.style.display = "inline-block"

}

}, 4000)

}


// THREE.JS SCENE

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(75,800/450,0.1,1000)

const renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(800,450)

document.getElementById("viewer").appendChild(renderer.domElement)

const ambient = new THREE.AmbientLight(0xffffff,1.5)
scene.add(ambient)

const light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(2,2,2)

scene.add(light)
camera.position.set(0,1,3)

const controls = new THREE.OrbitControls(camera,renderer.domElement)


// LOAD MODEL

function loadModel(url){

const loader = new THREE.GLTFLoader()

loader.load(

url,

function(gltf){

scene.clear()

scene.add(ambient)
scene.add(light)

currentModel = gltf.scene

// CENTER MODEL

const box = new THREE.Box3().setFromObject(currentModel)
const center = box.getCenter(new THREE.Vector3())

currentModel.position.sub(center)

scene.add(currentModel)

// AUTO CAMERA FIT

const size = box.getSize(new THREE.Vector3()).length()
const distance = size * 1.5

camera.position.set(0, size * 0.5, distance)
camera.lookAt(0,0,0)

controls.target.set(0,0,0)
controls.update()

},

undefined,

function(error){
console.error("Model load error:", error)
status.innerHTML = "Model could not be loaded"
}

)

}


// ANIMATION

function animate(){

requestAnimationFrame(animate)

controls.update()

renderer.render(scene,camera)

}

animate()


// URL AUTO LOAD MODEL

const params = new URLSearchParams(window.location.search)

const model = params.get("model")

if(model){

loadModel(model)

const download = document.getElementById("downloadBtn")
download.href = model
download.style.display = "inline-block"

}


// GALLERY

function saveToGallery(url){

const gallery = document.getElementById("gallery")

const img = document.createElement("img")
img.src="https://dummyimage.com/200x200/111/fff&text=3D"

img.onclick = ()=>loadModel(url)

gallery.appendChild(img)

}


// TOY MODES

function toyMode(){

if(!currentModel){
alert("Generate a 3D model first")
return
}

currentModel.scale.x *= 1.1
currentModel.scale.z *= 1.1
currentModel.scale.y *= 0.9

currentModel.traverse(child => {

if(child.isMesh){

child.material.metalness = 0.1
child.material.roughness = 0.3

}

})

if(toyBase) scene.remove(toyBase)

const geometry = new THREE.CylinderGeometry(0.8,0.8,0.15,32)

const material = new THREE.MeshStandardMaterial({
color:0x111111,
roughness:0.5
})

toyBase = new THREE.Mesh(geometry,material)

toyBase.position.y = -0.8

scene.add(toyBase)

status.innerHTML = "Toy Mode Activated"

}


function plasticToy(){

if(!currentModel) return

currentModel.traverse(child => {

if(child.isMesh){

child.material = new THREE.MeshStandardMaterial({
color:0xffcc99,
roughness:0.4,
metalness:0.1
})

}

})

status.innerHTML = "Plastic Toy Material"

}


function goldToy(){

if(!currentModel) return

currentModel.traverse(child => {

if(child.isMesh){

child.material = new THREE.MeshStandardMaterial({
color:0xffd700,
roughness:0.2,
metalness:1
})

}

})

status.innerHTML = "Gold Collectible"

}


function chromeToy(){

if(!currentModel) return

currentModel.traverse(child => {

if(child.isMesh){

child.material = new THREE.MeshStandardMaterial({
color:0xffffff,
metalness:1,
roughness:0
})

}

})

status.innerHTML = "Chrome Toy"

}


function cartoonToy(){

if(!currentModel) return

currentModel.traverse(child => {

if(child.isMesh){

child.material = new THREE.MeshToonMaterial({
color:0xff8844
})

}

})

status.innerHTML = "Cartoon Style"

}


function selfieToy(){

if(!currentModel){
alert("Generate a 3D model first")
return
}

currentModel.scale.x *= 1.15
currentModel.scale.z *= 1.15
currentModel.scale.y *= 0.85

currentModel.traverse(child => {

if(child.isMesh){

child.material = new THREE.MeshStandardMaterial({
color:0xffcc99,
roughness:0.35,
metalness:0.15
})

}

})

if(toyBase) scene.remove(toyBase)

const geometry = new THREE.CylinderGeometry(0.9,0.9,0.18,32)

const material = new THREE.MeshStandardMaterial({
color:0x111111,
roughness:0.6
})

toyBase = new THREE.Mesh(geometry,material)

toyBase.position.y = -0.9

scene.add(toyBase)

status.innerHTML = "Selfie Toy Created"

}

</script>

</body>
</html>
